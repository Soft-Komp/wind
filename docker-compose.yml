# =============================================================================
# docker-compose.yml — System Windykacja
# =============================================================================
# Środowisko: lokalne (dev/staging)
# MSSQL:  zewnętrzny, sieć lokalna — 192.168.0.53 (NIE w kontenerze)
# Redis:  kontener lokalny
# API:    kontener lokalny, port 8000
# Worker: Faza 6 — ARQ Worker + REST API (port 8001)
#
# Uruchomienie:
#   docker-compose up --build
#
# Tylko API bez workera:
#   docker-compose up redis api
#
# Zatrzymanie:
#   docker-compose down
#
# Zatrzymanie + usunięcie danych Redis:
#   docker-compose down -v
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # REDIS — cache, pub/sub SSE, broker ARQ
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: windykacja_redis
    command: >
      redis-server
      --save 60 1
      --loglevel notice
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: >
        sh -c '
          if [ -n "${REDIS_PASSWORD:-}" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
        '
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - windykacja_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────────────
  # API — FastAPI backend
  # IDENTYCZNA konfiguracja jak w działającej wersji — nic nie zmieniono
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: windykacja_api
    env_file:
      - .env
    environment:
      # MSSQL — zewnętrzny serwer w sieci lokalnej
      DB_HOST: "${DB_HOST:-192.168.0.53}"
      DB_PORT: "${DB_PORT:-1433}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER:-sa}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_TRUST_SERVER_CERTIFICATE: "${DB_TRUST_SERVER_CERTIFICATE:-true}"
      DB_ENCRYPT: "${DB_ENCRYPT:-false}"
      # Redis — usługa w tym samym compose
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@redis:6379/0"
      # Aplikacja
      APP_ENV: "${APP_ENV:-development}"
      DEBUG: "${DEBUG:-true}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./database:/app/database
      - ./database:/app/database:ro
      - ./logs:/app/logs
      - ./snapshots:/app/snapshots
      - ./archives:/app/archives
      - ./pdf_cache:/app/pdf_cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - windykacja_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ─────────────────────────────────────────────────────────────────────────
  # WORKER — ARQ background worker + REST API (port 8001)
  # Faza 6: odkomentowana i uzupełniona wersja z oryginalnego docker-compose
  # ─────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: windykacja_worker
    env_file:
      - .env
    environment:
      # MSSQL — identyczne jak API
      DB_HOST: "${DB_HOST:-192.168.0.53}"
      DB_PORT: "${DB_PORT:-1433}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER:-sa}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_TRUST_SERVER_CERTIFICATE: "${DB_TRUST_SERVER_CERTIFICATE:-true}"
      DB_ENCRYPT: "${DB_ENCRYPT:-false}"
      # Redis — identyczne jak API
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@redis:6379/0"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # Timezone + Python
      TZ: "Europe/Warsaw"
      PYTHONPATH: "/app"
    ports:
      - "8001:8001"
    volumes:
      - ./worker:/app/worker
      - ./logs:/app/logs
      - ./snapshots:/app/snapshots
      - ./archives:/app/archives
      - ./pdf_cache:/app/pdf_cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - windykacja_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

# ─────────────────────────────────────────────────────────────────────────────
# WOLUMENY
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# SIECI
# ─────────────────────────────────────────────────────────────────────────────
networks:
  windykacja_net:
    driver: bridge