version: "3.9"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: windykacja_mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: windykacja_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: windykacja_api
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      - mssql
      - redis
    restart: on-failure