# nginx/conf.d/default.conf
# =============================================================================
# System Windykacja — konfiguracja nginx reverse proxy
#
# Architektura:
#   windykacja_nginx (port 80/443) — jedyny punkt wejścia z zewnątrz
#   → /api/v1/events/*  → windykacja_api:8000  (SSE — bez buforowania!)
#   → /api/*            → windykacja_api:8000  (REST API)
#   → /worker-api/*     → windykacja_worker:8001 (ARQ REST — tylko sieć wewnętrzna)
#   → /*                → windykacja_frontend:3000 (Vue.js SPA)
#
# KRYTYCZNE — SSE:
#   Server-Sent Events wymagają wyłączonego buforowania nginx.
#   Bez proxy_buffering off wiadomości SSE nigdy nie dotrą do klienta.
#   Heartbeat (ping co 30s w events.py) utrzymuje połączenie przez timeout.
#
# Docker DNS re-resolution:
#   resolver 127.0.0.11 valid=10s — wymuszenie re-resolucji DNS po restarcie
#   kontenerów backendowych. Bez tego nginx cache'uje stare IP i nie może
#   połączyć się po restarcie api/frontend.
#   set $backend / $frontend — wymagane przy użyciu resolver z zmiennymi.
# =============================================================================

# ── Upstream — backend API ───────────────────────────────────────────────────
upstream windykacja_api {
    server windykacja_api:8000;
    keepalive 32;
}

# ── Upstream — worker REST API ───────────────────────────────────────────────
upstream windykacja_worker {
    server windykacja_worker:8001;
    keepalive 8;
}

# ── Upstream — frontend ──────────────────────────────────────────────────────
upstream windykacja_frontend {
    server windykacja_frontend:3000;
    keepalive 16;
}

# =============================================================================
# Serwer HTTP (port 80)
# =============================================================================
server {
    listen 80;
    server_name _;

    # Rozmiar ciała requestu (upload załączników — musi pasować do APPROVAL_MAX_ATTACHMENT_MB)
    client_max_body_size 25M;

    # Timeout requestu (default 60s — za mały dla SSE)
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     120s;

    # Nagłówki przekazywane do backendu
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Nagłówki bezpieczeństwa
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;

    # ── Lokalizacja 1: SSE — Server-Sent Events ──────────────────────────────
    # MUSI być przed ogólnym /api/ — bardziej szczegółowa ścieżka
    # proxy_buffering off — krytyczne, bez tego SSE nie działa przez nginx
    location /api/v1/events/ {
        proxy_pass         http://windykacja_api;
        proxy_http_version 1.1;

        # SSE — wyłącz buforowanie całkowite
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s;  # 1h — czas życia sesji SSE (events.py: _MAX_SESSION_SECONDS)

        # Wymagane dla long-polling / streaming
        proxy_set_header Connection    "";
        chunked_transfer_encoding      on;

        # Nagłówki SSE — przepuść Cache-Control i Content-Type
        proxy_pass_header  Cache-Control;
        proxy_pass_header  Content-Type;

        # Nie buforuj odpowiedzi po stronie nginx
        proxy_max_temp_file_size 0;
    }

    # ── Lokalizacja 2: REST API — backend FastAPI ─────────────────────────────
    location /api/ {
        proxy_pass         http://windykacja_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection   "";

        # Buforowanie odpowiedzi (REST) — OK, w przeciwieństwie do SSE
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        # Timeout dla długich requestów (generowanie PDF, bulk operations)
        proxy_read_timeout 120s;

        # Swagger UI — pliki statyczne przez FastAPI
        location /api/v1/docs {
            proxy_pass http://windykacja_api;
        }
        location /api/v1/openapi.json {
            proxy_pass http://windykacja_api;
        }
    }

    # ── Lokalizacja 3: Worker REST API ──────────────────────────────────────
    # Dostępny tylko z sieci wewnętrznej Docker lub przez VPN.
    # Na produkcji rozważ usunięcie tej lokalizacji i dostęp tylko przez
    # docker exec lub SSH tunnel.
    location /worker-api/ {
        # Przepuść przez — usuń prefix /worker-api
        rewrite ^/worker-api/(.*) /$1 break;
        proxy_pass         http://windykacja_worker;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 30s;

        # Ogranicz dostęp — tylko sieć lokalna
        # Odkomentuj na produkcji:
        # allow 192.168.0.0/24;
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Lokalizacja 4: Frontend — Vue.js SPA ────────────────────────────────
    # try_files → fallback do index.html dla Vue Router (client-side routing)
    location / {
        proxy_pass         http://windykacja_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # SPA routing — wszystkie ścieżki Vue Router trafiają do index.html
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    # Fallback dla Vue Router — zwróć index.html zamiast 404
    location @frontend_fallback {
        proxy_pass http://windykacja_frontend;
        proxy_set_header X-Fallback "1";
    }

    # ── Health check nginx (dla Docker healthcheck) ──────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Blokada dostępu do plików ukrytych ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}