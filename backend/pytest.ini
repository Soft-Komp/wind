[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*
asyncio_mode    = auto
timeout         = 30
log_cli         = false
log_level       = WARNING
filterwarnings  =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    slow: testy wolne (>5s)
    db: testy wymagające połączenia z bazą
    auth: testy autoryzacji
    faktury: testy modułu faktur
    infra: testy infrastruktury