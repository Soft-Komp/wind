# =============================================================================
# backend/alembic.ini
# Konfiguracja Alembic dla projektu Windykacja
#
# LOKALIZACJA: backend/alembic.ini  (ten sam katalog co alembic/)
#
# NAJWAŻNIEJSZE:
#   sqlalchemy.url — NIE ustawiaj tu hasła.
#     URL budowany dynamicznie w alembic/env.py z .env
#     Zmienne: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#     Opcjonalne: ODBC_DRIVER (domyślnie: ODBC Driver 18 for SQL Server)
#
# UŻYCIE:
#   Wszystkie polecenia uruchamiaj z katalogu backend/:
#
#   alembic upgrade head                             ← do najnowszej wersji
#   alembic downgrade -1                             ← cofnij jedną migrację
#   alembic downgrade base                           ← cofnij WSZYSTKIE
#   alembic revision --autogenerate -m "opis"        ← nowa migracja
#   alembic revision -m "opis"                       ← pusta migracja (ręczna)
#   alembic history --verbose                        ← historia z opisami
#   alembic current                                  ← aktualna wersja w DB
#   alembic show <revision_id>                       ← szczegóły rewizji
#   alembic stamp head                               ← oznacz bez migrowania
#                                                      (po ręcznym DDL)
#   alembic check                                    ← czy schema jest aktualna
#
# UWAGA PO ZMIANIE NAZW TABEL (skw_):
#   1. Uruchom DDL ręcznie (sqlcmd)
#   2. alembic stamp head
#   3. Od teraz alembic autogenerate widzi już skw_* tabele
#
# Wersja: 2.0.0 | Data: 2026-03-02
# =============================================================================

[alembic]

# ---------------------------------------------------------------------------
# Ścieżka do katalogu z plikami migracji
# Relatywna do lokalizacji tego pliku (backend/)
# ---------------------------------------------------------------------------
script_location = alembic

# ---------------------------------------------------------------------------
# Format nazwy pliku migracji
#
#   %%(rev)s    → identyfikator rewizji (12 znaków hex, unikalny)
#   %%(slug)s   → uproszczony opis (z -m "opis"), max 40 znaków
#
# Przykład: a1b2c3d4e5f6_skw_initial_schema_sync.py
# ---------------------------------------------------------------------------
file_template = %%(rev)s_%%(slug)s

# ---------------------------------------------------------------------------
# Sys.path — umożliwia import app.db.models, app.core.config itp.
# Relatywny do backend/  (gdzie leży ten plik)
# ---------------------------------------------------------------------------
prepend_sys_path = .

# ---------------------------------------------------------------------------
# SQLAlchemy URL — PLACEHOLDER, nadpisywany w env.py
# Nigdy nie wpisuj tu prawdziwych danych logowania
# ---------------------------------------------------------------------------
sqlalchemy.url = mssql+aioodbc://PLACEHOLDER_OVERRIDDEN_IN_ENV_PY

# ---------------------------------------------------------------------------
# Kodowanie plików migracji — UTF-8 dla polskich komentarzy
# ---------------------------------------------------------------------------
output_encoding = utf-8

# ---------------------------------------------------------------------------
# Timezone znaczników czasu w plikach migracji
# ---------------------------------------------------------------------------
timezone = UTC

# ---------------------------------------------------------------------------
# Długość slug (opisu) w nazwie pliku migracji
# 40 znaków wystarczy; dłuższe są obcinane automatycznie
# ---------------------------------------------------------------------------
truncate_slug_length = 40


# =============================================================================
# KONFIGURACJA LOGOWANIA ALEMBIC
#
# Architektura: dwa równoległe handlery:
#   1. console          → stdout  (widoczny w: docker logs windykacja-api)
#   2. file_rotating    → logs/alembic.log (rotacja dzienna, retencja 30 dni)
#
# Poziomy:
#   alembic             → INFO  (każdy krok migracji)
#   alembic.env         → DEBUG (nasza diagnostyka z env.py)
#   sqlalchemy.engine   → WARN  (wyciszony — nie zaśmieca logów)
#                               zmień na DEBUG gdy debugujesz połączenie
# =============================================================================

# ---------------------------------------------------------------------------
# Rejestr loggerów
# ---------------------------------------------------------------------------
[loggers]
keys = root, alembic, alembic_env, sqlalchemy_engine

# ---------------------------------------------------------------------------
# Rejestr handlerów
# ---------------------------------------------------------------------------
[handlers]
keys = console, file_rotating

# ---------------------------------------------------------------------------
# Rejestr formatterów
# ---------------------------------------------------------------------------
[formatters]
keys = generic, json_detailed


# =============================================================================
# LOGGERY
# =============================================================================

# Root — przechwytuje wszystko czego nie złapią bardziej szczegółowe loggery
[logger_root]
level     = WARNING
handlers  = console, file_rotating
qualname  =

# Alembic główny — każdy krok migracji (upgrade, downgrade, running revision...)
[logger_alembic]
level     = INFO
handlers  = console, file_rotating
qualname  = alembic
propagate = 0

# Nasz env.py — komunikaty diagnostyczne (build URL, include_object itp.)
[logger_alembic_env]
level     = DEBUG
handlers  = console, file_rotating
qualname  = alembic.env
propagate = 0

# SQLAlchemy engine — wyciszony (WARN). Przestaw na DEBUG do diagnostyki połączenia
[logger_sqlalchemy_engine]
level     = WARN
handlers  = console, file_rotating
qualname  = sqlalchemy.engine
propagate = 0


# =============================================================================
# HANDLERY
# =============================================================================

# Konsola (stdout) — format czytelny dla człowieka
[handler_console]
class     = StreamHandler
args      = (sys.stdout,)
level     = DEBUG
formatter = generic

# Plik z rotacją dzienną — format JSON (łatwy do parsowania, grep, splunk itp.)
[handler_file_rotating]
class    = logging.handlers.TimedRotatingFileHandler
args     = ('logs/alembic.log', 'midnight', 1, 30, 'utf-8')
# args:   (filename,             when,       interval, backupCount, encoding)
#   when='midnight'    → rotacja o północy
#   interval=1         → co 1 dzień
#   backupCount=30     → 30 plików wstecz (~1 miesiąc)
level    = DEBUG
formatter = json_detailed


# =============================================================================
# FORMATTERY
# =============================================================================

# Czytelny dla człowieka — używany przez konsolę
[formatter_generic]
format    = %(asctime)s | %(levelname)-8s | %(process)d | %(name)s | %(message)s
datefmt   = %Y-%m-%dT%H:%M:%S%z
class     = logging.Formatter

# JSON szczegółowy — używany przez plik. Parsowany przez systemy log agregacji.
# Format: timestamp | LEVEL | pid | logger | file:line | message
[formatter_json_detailed]
format    = %(asctime)s | %(levelname)-8s | %(process)d | %(name)s | %(pathname)s:%(lineno)d | %(message)s
datefmt   = %Y-%m-%dT%H:%M:%S%z
class     = logging.Formatter

version_path_separator = os