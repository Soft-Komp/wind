# =============================================================================
# alembic.ini — Konfiguracja Alembic dla projektu Windykacja
# =============================================================================
# Lokalizacja pliku: backend/alembic.ini
# Uruchamianie:
#   alembic upgrade head          ← migracja do najnowszej wersji
#   alembic downgrade -1          ← cofnięcie jednej migracji
#   alembic revision --autogenerate -m "opis_zmiany"   ← nowa migracja
#   alembic history               ← historia migracji
#   alembic current               ← aktualna wersja w bazie
#   alembic show <revision_id>    ← szczegóły konkretnej migracji
#
# WAŻNE: sqlalchemy.url NIE jest ustawiane tutaj.
#        URL budowany jest dynamicznie w alembic/env.py z zmiennych
#        środowiskowych (.env.docker / .env).
#        Zmienne wymagane: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#        Zmienne opcjonalne: ODBC_DRIVER (domyślnie: ODBC Driver 18 for SQL Server)
# =============================================================================

[alembic]

# ---------------------------------------------------------------------------
# Ścieżka do katalogu z plikami migracji (relatywna do alembic.ini)
# ---------------------------------------------------------------------------
script_location = alembic

# ---------------------------------------------------------------------------
# Format nazwy pliku migracji:
#   %%(year)d        → rok (np. 2026)
#   %%(month).2d     → miesiąc z zerem wiodącym (np. 02)
#   %%(day).2d       → dzień (np. 18)
#   %%(hour).2d      → godzina
#   %%(minute).2d    → minuty
#   %%(rev)s         → unikalny identyfikator rewizji (12 znaków hex)
#   %%(slug)s        → uproszczona wersja opisu (message)
#
# Przykład wyniku: 20260218_1423-a1b2c3d4e5f6_create_users_table.py
# ---------------------------------------------------------------------------
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# ---------------------------------------------------------------------------
# Katalog prepend do sys.path — umożliwia importowanie modułów aplikacji
# (np. app.db.models, app.core.config) wewnątrz env.py i plików migracji
# ---------------------------------------------------------------------------
prepend_sys_path = .

# ---------------------------------------------------------------------------
# SQLAlchemy URL — WYMAGANY przez Alembic, ale NADPISYWANY w env.py.
# Wartość poniżej nigdy nie jest używana do połączenia.
# Jest tutaj tylko dlatego, że Alembic wymaga klucza sqlalchemy.url.
# NIGDY nie wpisuj tu prawdziwych danych logowania!
# ---------------------------------------------------------------------------
sqlalchemy.url = mssql+aioodbc://PLACEHOLDER_OVERRIDDEN_IN_ENV_PY

# ---------------------------------------------------------------------------
# Kodowanie plików migracji — UTF-8 dla polskich znaków w komentarzach
# ---------------------------------------------------------------------------
output_encoding = utf-8

# ---------------------------------------------------------------------------
# Długość skrótu revision_id (hex)
# Domyślnie: 12 znaków — wystarczy dla unikalności, czytelna w historii
# ---------------------------------------------------------------------------
# revision_id_length = 12   ← domyślna wartość, nie trzeba nadpisywać

# ---------------------------------------------------------------------------
# Poziom logowania dla samego Alembic (nadpisywany przez sekcję [loggers])
# ---------------------------------------------------------------------------
# truncate_slug_length = 40  ← domyślna długość %%(slug)s

# ---------------------------------------------------------------------------
# Timezone dla timestampów w plikach migracji
# ---------------------------------------------------------------------------
timezone = UTC


# =============================================================================
# KONFIGURACJA LOGOWANIA
# Architektura: dwa handlery równolegle:
#   1. console   → stdout (widoczny w docker logs)
#   2. file      → logs/alembic.log (rotacja dzienna, 30 dni retencji)
# =============================================================================

# ---------------------------------------------------------------------------
# Rejestr loggerów — wszystkie loggery które mają być skonfigurowane
# ---------------------------------------------------------------------------
[loggers]
keys = root, alembic, alembic_env, sqlalchemy

# ---------------------------------------------------------------------------
# Rejestr handlerów — gdzie trafiają logi
# ---------------------------------------------------------------------------
[handlers]
keys = console, file_rotating

# ---------------------------------------------------------------------------
# Rejestr formatterów — jak wyglądają logi
# ---------------------------------------------------------------------------
[formatters]
keys = generic, detailed_json


# =============================================================================
# LOGGERY — konfiguracja szczegółowa
# =============================================================================

# ---------------------------------------------------------------------------
# Root logger — przechwytuje wszystko czego nie złapią bardziej szczegółowe
# ---------------------------------------------------------------------------
[logger_root]
level     = WARNING
handlers  = console, file_rotating
qualname  =

# ---------------------------------------------------------------------------
# Logger Alembic — główny logger dla operacji migracji
# Poziom INFO — widać każdy krok (upgrade, downgrade, running migration...)
# ---------------------------------------------------------------------------
[logger_alembic]
level     = INFO
handlers  = console, file_rotating
qualname  = alembic
# propagate=0 → logi NIE trafiają do root loggera (unikamy duplikatów)
propagate = 0

# ---------------------------------------------------------------------------
# Logger dla naszego env.py — mamy tam własne komunikaty diagnostyczne
# ---------------------------------------------------------------------------
[logger_alembic_env]
level     = DEBUG
handlers  = console, file_rotating
qualname  = alembic.env
propagate = 0

# ---------------------------------------------------------------------------
# Logger SQLAlchemy — wyciszony (WARN) żeby nie zaśmiecać logów zapytaniami.
# Przestaw na DEBUG tymczasowo gdy debugujesz problemy z połączeniem.
# ---------------------------------------------------------------------------
[logger_sqlalchemy]
level     = WARN
handlers  = console, file_rotating
qualname  = sqlalchemy.engine
propagate = 0


# =============================================================================
# HANDLERY — konfiguracja szczegółowa
# =============================================================================

# ---------------------------------------------------------------------------
# Handler 1: Konsola (stdout)
# Widoczny przez: docker logs windykacja-api
# Format: uproszczony — czytelny w terminalu
# ---------------------------------------------------------------------------
[handler_console]
class     = StreamHandler
args      = (sys.stdout,)
level     = INFO
formatter = generic

# ---------------------------------------------------------------------------
# Handler 2: Plik z rotacją czasową
#
# Klasa: TimedRotatingFileHandler
# args:
#   [0] = ścieżka do pliku logu
#   [1] = 'midnight' — rotacja o północy
#   [2] = interval (1 = co 1 dzień)
#   [3] = backupCount (30 = przechowuj 30 plików = 30 dni historii)
#   [4] = 'utf-8' — kodowanie pliku
#
# Wynikowe pliki: logs/alembic.log, logs/alembic.log.2026-02-18, ...
#
# WAŻNE: Katalog logs/ musi istnieć przed uruchomieniem.
#        Dockerfile lub entrypoint.sh powinien go tworzyć:
#        mkdir -p /app/logs
# ---------------------------------------------------------------------------
[handler_file_rotating]
class     = handlers.TimedRotatingFileHandler
args      = ('logs/alembic.log', 'midnight', 1, 30, 'utf-8')
level     = DEBUG
formatter = detailed_json

# =============================================================================
# FORMATTERY — jak wyglądają wpisy w logu
# =============================================================================

# ---------------------------------------------------------------------------
# Formatter 1: Generic — dla konsoli, krótki i czytelny
# Przykład: 2026-02-18 14:23:01,456 INFO  [alembic.runtime.migration] Running upgrade ...
# ---------------------------------------------------------------------------
[formatter_generic]
format    = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %Y-%m-%d %H:%M:%S

# ---------------------------------------------------------------------------
# Formatter 2: Detailed — dla pliku, z pełną ścieżką kodu źródłowego
# Przykład: więcej kontekstu do debugowania (plik, linia, process ID)
#
# %(process)d   → PID procesu (ważne przy multi-worker gunicorn/uvicorn)
# %(thread)d    → ID wątku
# %(pathname)s  → pełna ścieżka pliku źródłowego
# %(lineno)d    → numer linii
#
# UWAGA: Alembic nie uruchamia się przez uvicorn — jest osobnym procesem CLI,
#        więc PID/thread są mniej krytyczne, ale zostawiamy dla kompletności.
# ---------------------------------------------------------------------------
[formatter_detailed_json]
format    = %(asctime)s | %(levelname)-8s | %(process)d | %(name)s | %(pathname)s:%(lineno)d | %(message)s
datefmt   = %Y-%m-%dT%H:%M:%S%z


# =============================================================================
# KONIEC PLIKU
# =============================================================================
# Wersja dokumentu: 1.0.0
# Ostatnia aktualizacja: 2026-02-20
# Zgodność: Alembic >= 1.13.x, SQLAlchemy >= 2.0, Python >= 3.11
# Driver: ODBC Driver 18 for SQL Server (Debian/bookworm)
# Schema: dbo_ext (własne tabele), dbo (WAPRO — read-only, ignorowany)
# =============================================================================